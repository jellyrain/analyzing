plugin_id = "bracket_kv"
name = "括号键值解析器"
version = "0.1.0"
plugin_role = "biz"
plugin_type = "parser"
runtime_mode = "inproc"
sdk_version = ">=1.0.0"
summary = "从括号包裹的键值文本中提取内容。"
description = "一个基于括号键值模式的进程内解析插件。"
form_schema_file = "form.schema.json"

[capabilities]
accepts_text = true
accepts_structured_input = false
returns_multiple = true
returns_hierarchical = false

[runtime]
kind = "inproc"
search_paths = [""]

[runtime.entrypoint]
module = "bracket_kv.plugin"
attribute = "build_plugin"
