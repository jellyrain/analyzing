plugin_id = "str_time"
name = "字符串时间解析器"
version = "0.1.0"
plugin_role = "biz"
plugin_type = "parser"
runtime_mode = "inproc"
sdk_version = ">=1.0.0"
summary = "直接从文本中提取日期和时间字符串。"
description = "一个面向日期时间文本抽取的进程内解析插件。"

[capabilities]
