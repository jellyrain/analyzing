plugin_id = "auto_kv"
name = "键值对解析器"
version = "0.1.0"
plugin_role = "biz"
plugin_type = "parser"
runtime_mode = "inproc"
sdk_version = ">=1.0.0"
summary = "从冒号分隔文本中提取键值对。"
description = "一个从 KVParser 实现迁移而来的进程内解析插件。"
form_schema_file = "form.schema.json"

[capabilities]
accepts_text = true
accepts_structured_input = false
returns_multiple = true
returns_hierarchical = false

[runtime]
kind = "inproc"
search_paths = [""]

[runtime.entrypoint]
module = "auto_kv.plugin"
attribute = "build_plugin"
